name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend — lint + test
  # ─────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check src/ api.py --ignore E501 || true

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short || true

  # ─────────────────────────────────────────────
  # Frontend — type check + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://smart-contract-auditor-812q.onrender.com
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

  # ─────────────────────────────────────────────
  # ChainAudit — scan test contracts
  # ─────────────────────────────────────────────
  chainaudit:
    name: Smart Contract Security Scan
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install solc + Slither
        run: |
          pip install --quiet slither-analyzer solc-select
          solc-select install 0.8.24
          solc-select use 0.8.24

      - name: Install ChainAudit CLI
        working-directory: backend
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet -e .

      - name: Scan test contracts
        working-directory: backend
        id: scan
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Scanning test contracts..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Scan all test contracts
          python -m src.cli scan ../contracts/test --recursive --json > /tmp/scan_report.json 2>/dev/null || true

          # Parse results
          RISK=$(python3 -c "import json; d=json.load(open('/tmp/scan_report.json')); print(d.get('overall_risk_score', 0))" 2>/dev/null || echo "0")
          TOTAL=$(python3 -c "import json; d=json.load(open('/tmp/scan_report.json')); print(d.get('total_findings', 0))" 2>/dev/null || echo "0")
          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('/tmp/scan_report.json'))
          findings = d.get('findings', [])
          if not findings:
            findings = sum([f.get('findings', []) for f in d.get('files', [])], [])
          print(sum(1 for f in findings if f.get('severity') == 'CRITICAL'))
          " 2>/dev/null || echo "0")

          echo "risk_score=$RISK" >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "total_findings=$TOTAL" >> $GITHUB_OUTPUT

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Risk Score : $RISK / 100"
          echo "  Findings   : $TOTAL"
          echo "  Critical   : $CRITICAL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chainaudit-scan-report
          path: /tmp/scan_report.json
          retention-days: 30

      - name: Check for regressions
        working-directory: backend
        run: |
          # Scan the empty contract — should return 0 findings
          python -m src.cli scan ../contracts/test/01_empty.sol --json > /tmp/empty_scan.json 2>/dev/null || true
          FINDINGS=$(python3 -c "import json; print(json.load(open('/tmp/empty_scan.json')).get('total_findings', 0))" 2>/dev/null || echo "0")
          echo "Empty contract findings: $FINDINGS (expected 0)"
          if [ "$FINDINGS" -gt "0" ]; then
            echo "REGRESSION: Empty contract has $FINDINGS findings, expected 0"
            exit 1
          fi
          echo "Regression check passed."