services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: chainaudit-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/reports:/app/reports
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=https://uptcrcbsstjjadekwvrq.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwdGNyY2Jzc3RqamFkZWt3dnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDIzNDAsImV4cCI6MjA4OTQxODM0MH0.saKvb4IA3T7O-JyOyrMxMHbt5lA9Fqmxe36xijeLbJ0
        - NEXT_PUBLIC_API_URL=http://backend:8000
    platform: linux/amd64
    container_name: chainaudit-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: chainaudit-network